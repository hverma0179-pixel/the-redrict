services:
  - type: web
    name: url-redirect-analyzer
    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: MAX_REDIRECTS
        value: 10
      - key: REQUEST_TIMEOUT_MS
        value: 8000
      - key: ANALYZE_WINDOW_MS
        value: 900000
      - key: ANALYZE_MAX_REQUESTS
        value: 30
      - key: AUTH_WINDOW_MS
        value: 900000
      - key: AUTH_MAX_REQUESTS
        value: 12
